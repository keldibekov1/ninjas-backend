name: Backend deploy to VPS 

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Connect VPS and deploy changes
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            cd ninjasgroup/wms-backend/
            git pull origin main
            npm install
            npm run build
            rm -rf ~/ninjasgroup/wms-backend/src/modules
            pm2 restart backend
